<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tix 工作流 - 运行准备</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --success: #22c55e;
            --warning: #f59e0b;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            width: 600px;
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(to right, var(--accent), #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .task-list {
            list-style: none;
            padding: 0;
        }
        .task-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            transition: all 0.3s ease;
        }
        .task-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 1rem;
            background-color: var(--warning);
            box-shadow: 0 0 10px var(--warning);
        }
        .task-content { flex: 1; }
        .task-title { font-weight: 600; font-size: 1.1rem; }
        .task-desc { font-size: 0.9rem; color: #94a3b8; }
        .ready-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin-top: 2rem;
            background: linear-gradient(to right, var(--accent), #6366f1);
            color: white;
            border: none;
            border-radius: 0.8rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
        }
        .ready-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }
        .footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tix Workflow 运行准备</h1>
        <ul class="task-list">
            <li class="task-item">
                <div class="status-dot" style="background-color: var(--success); box-shadow: 0 0 10px var(--success);"></div>
                <div class="task-content">
                    <div class="task-title">浏览器连接已建立</div>
                    <div class="task-desc">已成功通过 CDP 端口 9222 连接到工作浏览器。</div>
                </div>
            </li>
            <li class="task-item">
                <div class="status-dot"></div>
                <div class="task-content">
                    <div class="task-title">大麦网登录确认</div>
                    <div class="task-desc">请在右侧标签页确认已登录，并处理可能出现的滑块验证码。</div>
                </div>
            </li>
            <li class="task-item">
                <div class="status-dot" id="weibo-dot"></div>
                <div class="task-content">
                    <div class="task-title">微博 RPA 授权</div>
                    <div class="task-desc">如需进行找客，请确保微博已登录且处于活动状态。</div>
                </div>
            </li>
        </ul>
        <div class="ready-btn">我已完成准备，开始运行</div>
        <div class="footer">CloudPhone Tix Orchestrator v1.0</div>
    </div>
</body>
</html>
